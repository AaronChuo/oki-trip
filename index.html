<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="沖繩家族旅行行程集：每一趟一個路由">
<meta name="robots" content="noindex">
<title>沖繩行程集</title>
<style>
  :root {
    --paper:#F7F9F8; --card:#FFFFFF; --ink:#1C2E33; --ink-2:#55696E; --line:#DCE5E4; --sea:#0E6B72;
  }
  @media (prefers-color-scheme: dark) {
    :root { --paper:#0E181B; --card:#162428; --ink:#E4EDEB; --ink-2:#93A8AB; --line:#2A3B40; --sea:#5FB8BB; }
  }
  * { box-sizing:border-box; }
  body {
    background:var(--paper); color:var(--ink); margin:0; padding:0 20px 80px;
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei","Hiragino Sans",sans-serif; line-height:1.75;
  }
  .wrap { max-width:640px; margin:0 auto; }
  header { padding:64px 0 24px; }
  h1 { font-size:clamp(30px,7vw,40px); margin:0; letter-spacing:.06em; }
  h1 small { display:block; font-size:.42em; font-weight:500; color:var(--ink-2); letter-spacing:.14em; margin-top:8px; }
  a.trip {
    display:block; background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px 22px; margin-top:14px; text-decoration:none; color:inherit;
  }
  a.trip:hover { border-color:var(--sea); }
  a.trip:focus-visible { outline:2px solid var(--sea); outline-offset:2px; }
  .trip .num { font-size:12px; font-weight:700; letter-spacing:.18em; color:var(--sea); font-variant-numeric:tabular-nums; }
  .trip h2 { margin:4px 0 2px; font-size:19px; letter-spacing:.02em; }
  .trip p { margin:0; font-size:13.5px; color:var(--ink-2); }
  .trip.soon { opacity:.6; }
  footer { margin-top:48px; font-size:12.5px; color:var(--ink-2); border-top:1px solid var(--line); padding-top:14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>沖繩行程集<small>OKI-TRIP · 每一趟，一個路由</small></h1>
  </header>

  <a class="trip" href="/xiii/">
    <span class="num">XIII · 2026.07.25 – 08.09</span>
    <h2>沙灘、寄居蟹、還有熟悉的三味線</h2>
    <p>16 天 15 夜親子自駕：那霸 → 美國村 → 恩納 → 本部 → 國頭 → 瀨長島</p>
  </a>

  <a class="trip" href="/xiv/">
    <span class="num">XIV · 2026.08.15 – 08.23（暫定）</span>
    <h2>讀谷遊學手帳（初步課表）</h2>
    <p>9 天 8 夜：与那原大綱曳 → むら咲むら 5 晚（妖怪祭）→ 本部 Orion 2 晚</p>
  </a>

  <footer>私人家族行程頁 · 內容僅供自家旅行使用</footer>
</div>
</body>
</html>
